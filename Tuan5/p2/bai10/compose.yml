services:
  mysql:
    image: mysql:8.0
    container_name: mysql-volume
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: mydb
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    volumes:
      - mysql_persistent:/var/lib/mysql
    ports:
      - "3306:3306"

volumes:
  mysql_persistent:
    name: mysql_data_persistent