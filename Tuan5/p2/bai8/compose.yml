services:
  mysql:
    image: mysql:8.0
    container_name: bai8-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: mydb
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: bai8-node
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy