services:
  redis:
    image: redis:alpine
    container_name: p3-redis

  django:
    build: .
    container_name: django-app
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: python manage.py runserver 0.0.0.0:8000
    depends_on:
      - redis

  celery:
    build: .
    container_name: celery-worker
    volumes:
      - .:/app
    command: celery -A myproject worker --loglevel=info
    depends_on:
      - redis
      - django